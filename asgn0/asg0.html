<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br />
    <label for="v1x">v1 x:</label>
    <input id="v1x" type="number" step="any" value="2.25" />
    <label for="v1y">v1 y:</label>
    <input id="v1y" type="number" step="any" value="2.25" />
    <br />
    <label for="v2x">v2 x:</label>
    <input id="v2x" type="number" step="any" value="0" />
    <label for="v2y">v2 y:</label>
    <input id="v2y" type="number" step="any" value="0" />
    <input id="drawButton" type="button" value="Draw" />
    <br />
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Sub</option>
      <option value="div">Div</option>
      <option value="mul">Mul</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle between</option>
      <option value="area">Area</option>
    </select>
    <input id="scalar" type="number" step="any" value="1" />
    <input id="operationButton" type="button" value="Operation" />
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
